<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Operativo v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-200 p-4 font-mono text-sm">
    <div class="max-w-lg mx-auto bg-gray-800 rounded-lg shadow-2xl p-5 border border-gray-700">
        <h1 class="text-xl font-bold mb-4 text-white border-b border-gray-600 pb-2 uppercase tracking-tighter">Hub Monitoraggio Cloud</h1>
        
        <!-- DEBUG CONSOLE: Fondamentale per capire l'errore -->
        <div id="debug-info" class="bg-black text-yellow-500 p-2 text-[10px] mb-4 border border-yellow-900 rounded hidden"></div>

        <div class="space-y-4">
            <section class="p-4 bg-gray-700/50 rounded border border-gray-600">
                <h2 class="text-xs font-bold mb-3 text-gray-400 uppercase">Tabacco</h2>
                <button id="btn-sigaretta" class="w-full bg-red-800 active:scale-95 text-white font-bold py-3 rounded border border-red-600 shadow-lg">REGISTRA SIGARETTA</button>
            </section>

            <section class="p-4 bg-gray-700/50 rounded border border-gray-600">
                <h2 class="text-xs font-bold mb-3 text-gray-400 uppercase">Alcolici</h2>
                <select id="select-alcolico" class="w-full mb-3 bg-gray-900 text-white border border-gray-500 rounded p-3 focus:ring-1 focus:ring-blue-500 outline-none">
                    <option value="">Caricamento...</option>
                </select>
                <button id="btn-alcolico" class="w-full bg-blue-800 active:scale-95 text-white font-bold py-3 rounded border border-blue-600 shadow-lg">REGISTRA ALCOLICO</button>
            </section>
        </div>

        <div class="mt-6 bg-gray-900 p-4 rounded border border-gray-700">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-xs font-bold text-gray-500 uppercase">Log Recenti</h2>
                <div id="status-cloud" class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
            </div>
            <ul id="log-lista" class="space-y-3"></ul>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: 'https://fyibnjnqrmgzeozxxsfx.supabase.co',
            KEY: 'sb_publishable_uh8m1jolttETPja2PACa4A_BghkyfoP'
        };

        const BEVANDE = [
            { id: "b1", n: "Birra Piccola", v: 200, a: 5.0 },
            { id: "b2", n: "Birra Bott. 330", v: 330, a: 5.0 },
            { id: "b3", n: "Birra Media", v: 400, a: 5.0 },
            { id: "b4", n: "Birra Bott. 660", v: 660, a: 5.0 },
            { id: "v1", n: "Vino Calice", v: 150, a: 12.0 },
            { id: "v2", n: "Vino Bottiglia", v: 750, a: 12.0 },
            { id: "a1", n: "Amaro", v: 60, a: 30.0 },
            { id: "s1", n: "Shot", v: 40, a: 40.0 },
            { id: "c1", n: "Cocktail", v: 200, a: 15.0 }
        ];

        let sb = null;

        function debug(msg) {
            const d = document.getElementById('debug-info');
            d.classList.remove('hidden');
            d.innerHTML += `> ${msg}<br>`;
        }

        // 1. POPOLAMENTO ISTANTANEO UI
        function setupUI() {
            const sel = document.getElementById('select-alcolico');
            sel.innerHTML = '';
            BEVANDE.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b.id;
                opt.textContent = `${b.n} (${b.v}ml)`;
                sel.appendChild(opt);
            });
            debug("UI Inizializzata");
        }

        // 2. CONNESSIONE CLOUD
        async function connect() {
            try {
                if (typeof supabase === 'undefined') throw new Error("Libreria Supabase mancante");
                sb = supabase.createClient(CONFIG.URL, CONFIG.KEY);
                document.getElementById('status-cloud').classList.replace('bg-red-600', 'bg-green-600');
                debug("Cloud Connesso");
                await refresh();
            } catch (e) {
                debug("ERRORE: " + e.message);
            }
        }

        async function refresh() {
            const { data, error } = await sb.from('registrazioni').select('*').order('created_at', { ascending: false }).limit(20);
            if (error) debug("Refresh Error: " + error.message);
            render(data || []);
        }

        async function add(nome, qta) {
            debug(`Inserimento: ${nome}...`);
            const { error } = await sb.from('registrazioni').insert([{ nome, quantita: qta }]);
            if (error) alert("Errore: " + error.message);
            await refresh();
        }

        function render(items) {
            const list = document.getElementById('log-lista');
            list.innerHTML = '';
            items.forEach(i => {
                const time = new Date(i.created_at).toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});
                const li = document.createElement('li');
                li.className = "flex justify-between items-center bg-gray-800/50 p-2 rounded border border-gray-700";
                li.innerHTML = `<div><p class="text-[10px] text-gray-500">${time}</p><p class="text-white font-bold">${i.nome}</p><p class="text-[10px] text-gray-400">${i.quantita}</p></div>
                                <button onclick="del('${i.id}')" class="text-red-500 text-[10px] border border-red-900 px-2 py-1 rounded">ELIMINA</button>`;
                list.appendChild(li);
            });
        }

        window.del = async (id) => {
            await sb.from('registrazioni').delete().eq('id', id);
            await refresh();
        };

        document.getElementById('btn-sigaretta').onclick = () => add("Sigaretta", "1 unità");
        document.getElementById('btn-alcolico').onclick = () => {
            const b = BEVANDE.find(x => x.id === document.getElementById('select-alcolico').value);
            const g = (b.v * (b.a / 100) * 0.789).toFixed(2);
            add(b.n, `${b.v}ml | ${b.a}% | ${g}g`);
        };

        window.onload = () => {
            setupUI();
            setTimeout(connect, 500); // Ritardo per permettere il caricamento delle librerie
        };
    </script>
</body>
</html>
