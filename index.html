<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale di Tracciamento Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Integrazione Libreria Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-200 p-6 font-mono">
    <div class="max-w-lg mx-auto bg-gray-800 rounded-lg shadow-xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-white border-b border-gray-600 pb-2">Terminale Cloud - Hub</h1>
        
        <!-- Macro-Categoria: Tabacco -->
        <div class="mb-6 p-4 bg-gray-700 rounded border border-gray-600">
            <h2 class="text-lg font-semibold mb-3 text-gray-300">Macro-Categoria: Tabacco</h2>
            <button id="btn-sigaretta" class="w-full bg-red-800 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded transition duration-200 border border-red-600 shadow-md">
                Registra 1 Sigaretta
            </button>
        </div>

        <!-- Macro-Categoria: Alcolici -->
        <div class="mb-8 p-4 bg-gray-700 rounded border border-gray-600">
            <h2 class="text-lg font-semibold mb-3 text-gray-300">Macro-Categoria: Alcolici</h2>
            <select id="select-alcolico" class="w-full mb-4 bg-gray-900 text-white border border-gray-500 rounded p-3 focus:outline-none focus:border-blue-500">
                <!-- Opzioni iniettate dal motore logico -->
            </select>
            <button id="btn-alcolico" class="w-full bg-blue-800 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded transition duration-200 border border-blue-600 shadow-md">
                Registra Alcolico
            </button>
        </div>

        <!-- Log Odierno -->
        <div class="bg-gray-900 p-4 rounded border border-gray-700 relative">
            <h2 class="text-lg font-semibold mb-3 text-gray-400">Log Sistema (Supabase)</h2>
            <div id="loader" class="hidden absolute top-4 right-4 text-sm text-blue-400 animate-pulse">Sincronizzazione in corso...</div>
            <ul id="log-lista" class="space-y-2 text-sm"></ul>
        </div>
    </div>

    <script>
        // === INSERISCA QUI I SUOI DATI SUPABASE ===
        const SUPABASE_URL = 'INSERISCA_QUI_IL_SUO_URL'; 
        const SUPABASE_ANON_KEY = 'INSERISCA_QUI_LA_SUA_CHIAVE_ANON';
        // ==========================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // MOTORE DATI CLOUD
        const DataCore = {
            categorieAlcolici: [
                { id: "birra_piccola", nome: "Birra Piccola", volume_ml: 200, abv: 5.0 },
                { id: "birra_bottiglia_330", nome: "Birra Bott. 330", volume_ml: 330, abv: 5.0 },
                { id: "birra_media", nome: "Birra Media", volume_ml: 400, abv: 5.0 },
                { id: "birra_bottiglia_660", nome: "Birra Bott. 660", volume_ml: 660, abv: 5.0 },
                { id: "vino_calice", nome: "Vino Calice", volume_ml: 150, abv: 12.0 },
                { id: "vino_bottiglia", nome: "Vino Bottiglia", volume_ml: 750, abv: 12.0 },
                { id: "amaro_bicchiere", nome: "Amaro/Digestivo", volume_ml: 60, abv: 30.0 },
                { id: "shot", nome: "Shot", volume_ml: 40, abv: 40.0 },
                { id: "cocktail", nome: "Cocktail", volume_ml: 200, abv: 15.0 }
            ],

            async caricaDati() {
                const { data, error } = await supabase
                    .from('registrazioni')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50); // Limita ai 50 più recenti per ottimizzare le prestazioni
                
                if (error) {
                    console.error("Errore recupero dati:", error);
                    return [];
                }
                return data;
            },

            async registraDato(nomeInserito, quantitaInserita) {
                const { error } = await supabase
                    .from('registrazioni')
                    .insert([{ nome: nomeInserito, quantita: quantitaInserita }]);
                
                if (error) console.error("Errore inserimento:", error);
                return this.caricaDati();
            },

            async registraTabacco() {
                return await this.registraDato("Sigaretta", "1 unità");
            },

            async registraAlcolico(idCategoria) {
                const categoria = this.categorieAlcolici.find(c => c.id === idCategoria);
                if (!categoria) return false;

                const massaAlcolica = (categoria.volume_ml * (categoria.abv / 100) * 0.789).toFixed(2);
                const stringaQuantita = `${categoria.volume_ml}ml | ${categoria.abv}% ABV | ${massaAlcolica}g`;
                
                return await this.registraDato(categoria.nome, stringaQuantita);
            },

            async rimuoviRecord(idRecord) {
                const { error } = await supabase
                    .from('registrazioni')
                    .delete()
                    .eq('id', idRecord);
                
                if (error) console.error("Errore rimozione:", error);
                return this.caricaDati();
            }
        };

        // MANIPOLAZIONE DOM
        document.addEventListener('DOMContentLoaded', async () => {
            const selectAlcolico = document.getElementById('select-alcolico');
            const btnSigaretta = document.getElementById('btn-sigaretta');
            const btnAlcolico = document.getElementById('btn-alcolico');
            const listaLog = document.getElementById('log-lista');
            const loader = document.getElementById('loader');

            function toggleLoader(stato) {
                stato ? loader.classList.remove('hidden') : loader.classList.add('hidden');
            }

            // Inizializzazione tendina
            DataCore.categorieAlcolici.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = `${cat.nome} (${cat.volume_ml}ml - ${cat.abv}%)`;
                selectAlcolico.appendChild(option);
            });

            // Caricamento Iniziale
            toggleLoader(true);
            const datiIniziali = await DataCore.caricaDati();
            aggiornaLogVisivo(datiIniziali);
            toggleLoader(false);

            // Trigger Inserimento Tabacco
            btnSigaretta.onclick = async () => {
                toggleLoader(true);
                const datiAggiornati = await DataCore.registraTabacco();
                aggiornaLogVisivo(datiAggiornati);
                toggleLoader(false);
            };

            // Trigger Inserimento Alcolici
            btnAlcolico.onclick = async () => {
                toggleLoader(true);
                const idSelezionato = selectAlcolico.value;
                const datiAggiornati = await DataCore.registraAlcolico(idSelezionato);
                if (datiAggiornati) aggiornaLogVisivo(datiAggiornati);
                toggleLoader(false);
            };

            // Rendering del Log
            function aggiornaLogVisivo(dati) {
                listaLog.innerHTML = '';
                
                dati.forEach(item => {
                    const li = document.createElement('li');
                    const dataObj = new Date(item.created_at);
                    const dataFormattata = dataObj.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                    const oraFormattata = dataObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                    
                    li.className = "flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-gray-800 pb-2 mb-2";
                    
                    li.innerHTML = `
                        <div class="flex flex-col">
                            <span class="text-gray-200">
                                <span class="text-gray-500 text-xs mr-2">[${dataFormattata} ${oraFormattata}]</span>
                                ${item.nome}
                            </span>
                            <span class="text-gray-400 font-bold text-xs mt-1">${item.quantita}</span>
                        </div>
                        <button onclick="richiediRimozioneCloud('${item.id}')" class="mt-2 sm:mt-0 text-red-500 hover:text-red-400 text-xs font-bold px-2 py-1 border border-red-800 rounded hover:bg-gray-800 transition">
                            Rimuovi
                        </button>
                    `;
                    listaLog.appendChild(li);
                });
            }

            // Funzione globale per rimozione asincrona
            window.richiediRimozioneCloud = async function(id) {
                toggleLoader(true);
                const datiAggiornati = await DataCore.rimuoviRecord(id);
                aggiornaLogVisivo(datiAggiornati);
                toggleLoader(false);
            };
        });
    </script>
</body>
</html>
