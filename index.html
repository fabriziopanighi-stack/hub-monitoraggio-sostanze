<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Health Monitor v4.6</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(71, 85, 105, 0.3); }
        .stat-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200 min-h-screen p-4 md:p-8 custom-scrollbar">
    <div class="max-w-2xl mx-auto">
        <header class="mb-6 flex justify-between items-start border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white uppercase italic">Health <span class="text-blue-500">Intelligence</span></h1>
                <p id="system-date" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <div id="status-cloud" class="w-3 h-3 rounded-full bg-red-600 shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="stat-card p-4 rounded-xl border-l-2 border-emerald-500 shadow-lg">
                <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-2">Timer Attività</p>
                <div class="flex justify-between text-[11px] mb-1">
                    <span class="text-slate-400 uppercase">Ultima Sigaretta:</span>
                    <span id="timer-sigaretta" class="font-bold text-white">--:--</span>
                </div>
                <div class="flex justify-between text-[11px]">
                    <span class="text-slate-400 uppercase">Ultimo Alcolico:</span>
                    <span id="timer-alcolico" class="font-bold text-white">--:--</span>
                </div>
            </div>
            <div class="stat-card p-4 rounded-xl border-l-2 border-amber-500 shadow-lg">
                <p class="text-[9px] font-black text-amber-500 uppercase tracking-widest mb-2">Stima Alcolemica (BAC)</p>
                <div class="flex justify-between text-[11px] mb-1">
                    <span class="text-slate-400 uppercase">Tasso Stimato:</span>
                    <span id="bac-value" class="font-bold text-white">0.00 g/l</span>
                </div>
                <div class="flex justify-between text-[11px]">
                    <span class="text-slate-400 uppercase">Guida:</span>
                    <span id="bac-wait-time" class="font-bold text-emerald-500">Idoneo</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="stat-card p-4 rounded-xl">
                <p class="text-[9px] font-black text-emerald-500 uppercase tracking-widest mb-1">Risparmio Settimanale</p>
                <p id="saving-week" class="text-xl font-bold text-white">€ 0.00</p>
            </div>
            <div class="stat-card p-4 rounded-xl border-l-2 border-blue-500">
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1">Proiezione Annua</p>
                <p id="saving-year" class="text-xl font-bold text-white">€ 0.00</p>
            </div>
            <div class="stat-card p-4 rounded-xl">
                <p class="text-[9px] font-black text-amber-500 uppercase tracking-widest mb-1">Status Rigenerazione</p>
                <p id="health-milestone" class="text-[10px] font-medium text-slate-300 leading-tight italic">Analisi in corso...</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <button id="btn-sigaretta" class="bg-gradient-to-br from-rose-700 to-rose-900 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-xs border border-rose-500/30">Log Sigaretta</button>
            <div class="flex flex-col gap-2">
                <select id="select-alcolico" class="bg-slate-900 border border-slate-700 rounded-lg p-3 text-xs outline-none text-slate-300"></select>
                <button id="btn-alcolico" class="bg-gradient-to-br from-blue-700 to-blue-900 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-[10px] border border-blue-500/30">Log Alcolico</button>
            </div>
        </div>

        <div class="glass-card rounded-2xl overflow-hidden shadow-2xl">
            <nav class="flex bg-slate-800/40 p-1">
                <button onclick="switchView('live')" id="tab-live" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all bg-blue-600 text-white">Live Feed</button>
                <button onclick="switchView('giorni')" id="tab-giorni" class="flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-lg text-slate-500">Storico</button>
            </nav>
            <div class="p-5 max-h-[500px] overflow-y-auto custom-scrollbar">
                <div id="loader" class="hidden text-center py-10"><div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div></div>
                <ul id="log-lista" class="space-y-4"></ul>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            URL: 'https://fyibnjnqrmgzeozxxsfx.supabase.co',
            KEY: 'sb_publishable_uh8m1jolttETPja2PACa4A_BghkyfoP',
            BASELINE_SPESA: 124.50,
            PROFILE: { peso: 60, burn_rate: 0.15, limit_bac: 0.5 }
        };

        const BEVANDE = [
            { id: "b1", n: "Birra Piccola", v: 200, a: 5.0, c: 3.5 },
            { id: "b2", n: "Birra Bottiglia 33cl", v: 330, a: 5.0, c: 4.0 },
            { id: "b3", n: "Birra Media", v: 400, a: 5.0, c: 5.0 },
            { id: "b4", n: "Birra Bottiglia 66cl", v: 660, a: 5.0, c: 6.0 },
            { id: "v1", n: "Vino Calice", v: 150, a: 12.0, c: 5.0 },
            { id: "v2", n: "Vino Bottiglia", v: 750, a: 12.0, c: 18.0 },
            { id: "a1", n: "Amaro / Digestivo", v: 60, a: 30.0, c: 4.0 },
            { id: "s1", n: "Shot / Superalcolico", v: 40, a: 40.0, c: 4.0 },
            { id: "c1", n: "Cocktail", v: 200, a: 15.0, c: 8.0 }
        ];

        let sb = null;
        let rawData = [];
        let currentView = 'live';

        function getDeltaConfig(ms) {
            const mins = ms / 60000;
            if (mins < 90) return { label: "Critico", color: "text-rose-500" };
            if (mins < 180) return { label: "Moderato", color: "text-amber-500" };
            return { label: "Ottimale", color: "text-emerald-500" };
        }

        function formatDelta(ms) {
            const mins = Math.floor(ms / 60000);
            const hrs = Math.floor(mins / 60);
            return hrs > 0 ? `${hrs}h ${mins % 60}m` : `${mins}m`;
        }

        function getHealthInsight(ms) {
            const mins = ms / 60000;
            if (mins < 20) return "Battito cardiaco in stabilizzazione.";
            if (mins < 720) return "Livelli di CO nel sangue normalizzati.";
            if (mins < 2880) return "Rigenerazione dei recettori sensoriali.";
            return "Funzionalità polmonare in netto recupero.";
        }

        async function connect() {
            try {
                sb = supabase.createClient(CONFIG.URL, CONFIG.KEY);
                document.getElementById('status-cloud').classList.replace('bg-red-600', 'bg-emerald-500');
                await refresh();
            } catch (e) { console.error("Errore connessione:", e); }
        }

        async function refresh() {
            const loader = document.getElementById('loader');
            if(loader) loader.classList.remove('hidden');
            const { data, error } = await sb.from('registrazioni').select('*').order('created_at', { ascending: false }).limit(300);
            if (!error) {
                rawData = data;
                updateAnalytics();
                updateBiometrics();
                render();
            }
            if(loader) loader.classList.add('hidden');
        }

        function updateAnalytics() {
            if (rawData.length === 0) return;
            const ora = new Date();
            const day = ora.getDay();
            const diffDays = day === 0 ? -6 : 1 - day;
            const inizioSettimana = new Date(new Date().setDate(ora.getDate() + diffDays)).setHours(0,0,0,0);
            
            let spesaSettimanale = 0;
            rawData.filter(i => new Date(i.created_at) >= inizioSettimana).forEach(i => {
                if (i.nome === "Sigaretta") spesaSettimanale += 0.30;
                else {
                    const bevanda = BEVANDE.find(b => b.n === i.nome);
                    if (bevanda) spesaSettimanale += bevanda.c;
                }
            });

            const risparmioSett = Math.max(0, CONFIG.BASELINE_SPESA - spesaSettimanale);
            document.getElementById('saving-week').innerText = `€ ${risparmioSett.toFixed(2)}`;
            document.getElementById('saving-year').innerText = `€ ${(risparmioSett * 52.14).toFixed(2)}`;

            const diffHealth = Date.now() - new Date(rawData[0].created_at).getTime();
            document.getElementById('health-milestone').innerText = getHealthInsight(diffHealth);
        }

        function updateBiometrics() {
            if (rawData.length === 0) return;
            const lastSig = rawData.find(i => i.nome === "Sigaretta");
            const lastAlc = rawData.find(i => i.nome !== "Sigaretta");

            if (lastSig) document.getElementById('timer-sigaretta').innerText = formatDelta(Date.now() - new Date(lastSig.created_at).getTime());
            if (lastAlc) {
                document.getElementById('timer-alcolico').innerText = formatDelta(Date.now() - new Date(lastAlc.created_at).getTime());
                calculateBAC(lastAlc);
            }
        }

        function calculateBAC(ultimo) {
            const ore = (Date.now() - new Date(ultimo.created_at).getTime()) / 3600000;
            const match = ultimo.quantita.match(/(\d+\.\d+)g/);
            if (!match) return;
            const bacInit = parseFloat(match[1]) * 0.0154;
            let bacAttuale = Math.max(0, bacInit - (ore * CONFIG.PROFILE.burn_rate));
            
            document.getElementById('bac-value').innerText = `${bacAttuale.toFixed(2)} g/l`;
            const waitEl = document.getElementById('bac-wait-time');
            if (bacAttuale > CONFIG.PROFILE.limit_bac) {
                const min = Math.ceil(((bacAttuale - CONFIG.PROFILE.limit_bac) / CONFIG.PROFILE.burn_rate) * 60);
                waitEl.innerText = `Attesa: ${min}m`;
                waitEl.className = "font-bold text-rose-500 animate-pulse";
            } else {
                waitEl.innerText = "Idoneo";
                waitEl.className = "font-bold text-emerald-500";
            }
        }

        function render() {
            const list = document.getElementById('log-lista');
            list.innerHTML = '';
            if (currentView === 'live') {
                const categories = { 'Sigaretta': null, 'Alcohol': null };
                const processed = [...rawData].reverse().map(item => {
                    const catKey = item.nome !== "Sigaretta" ? 'Alcohol' : 'Sigaretta';
                    const currentTs = new Date(item.created_at).getTime();
                    const delta = categories[catKey] ? currentTs - categories[catKey] : null;
                    categories[catKey] = currentTs;
                    return { ...item, delta };
                }).reverse();

                processed.forEach(i => {
                    const dt = new Date(i.created_at);
                    const dConfig = i.delta ? getDeltaConfig(i.delta) : null;
                    const li = document.createElement('li');
                    li.className = "flex justify-between items-center bg-slate-800/30 p-4 rounded-xl border border-slate-700/50";
                    li.innerHTML = `
                        <div>
                            <p class="text-[9px] font-bold text-slate-500 uppercase">${dt.toLocaleTimeString('it-IT')} — ${dt.toLocaleDateString('it-IT')}</p>
                            <p class="text-sm font-bold text-white uppercase">${i.nome}</p>
                            <p class="text-[10px] text-slate-400 mt-1">${i.quantita}</p>
                        </div>
                        <div class="flex flex-col items-end">
                            ${i.delta ? `<span class="text-[9px] font-black ${dConfig.color} uppercase tracking-widest">Δ ${formatDelta(i.delta)}</span>` : '<span class="text-[9px] text-slate-600 uppercase italic">Start</span>'}
                            <button onclick="del('${i.id}')" class="mt-2 text-rose-500/50 text-[9px] font-bold uppercase p-2">Elimina</button>
                        </div>`;
                    list.appendChild(li);
                });
            } else {
                const g = {};
                rawData.forEach(i => {
                    const key = new Date(i.created_at).toLocaleDateString('it-IT');
                    if (!g[key]) g[key] = { s:0, a:0 };
                    i.nome === "Sigaretta" ? g[key].s++ : g[key].a++;
                });
                Object.keys(g).forEach(k => {
                    const li = document.createElement('li');
                    li.className = "p-4 bg-slate-800/50 rounded-xl border-l-2 border-blue-500";
                    li.innerHTML = `<p class="text-[10px] font-black text-blue-400 uppercase mb-2">${k}</p><p class="text-sm text-white font-bold">🚬 ${g[k].s} Unità | 🍷 ${g[k].a} Consumazioni</p>`;
                    list.appendChild(li);
                });
            }
        }

        window.del = async (id) => { if(confirm("Conferma rimozione?")) { await sb.from('registrazioni').delete().eq('id', id); await refresh(); } };
        document.getElementById('btn-sigaretta').onclick = async () => { await sb.from('registrazioni').insert([{ nome: "Sigaretta", quantita: "1 unità" }]); await refresh(); };
        document.getElementById('btn-alcolico').onclick = async () => {
            const b = BEVANDE.find(x => x.id === document.getElementById('select-alcolico').value);
            const g = (b.v * (b.a / 100) * 0.789).toFixed(2);
            await sb.from('registrazioni').insert([{ nome: b.n, quantita: `${b.v}ml | ${b.a}% | ${g}g` }]);
            await refresh();
        };

        function switchView(v) {
            currentView = v;
            document.querySelectorAll('[id^="tab-"]').forEach(t => { t.classList.remove('bg-blue-600', 'text-white'); t.classList.add('text-slate-500'); });
            document.getElementById(`tab-${v}`).classList.add('bg-blue-600', 'text-white');
            render();
        }

        window.onload = () => {
            document.getElementById('system-date').innerText = new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
            const sel = document.getElementById('select-alcolico');
            BEVANDE.forEach(b => { const opt = document.createElement('option'); opt.value = b.id; opt.textContent = `${b.n} (${b.v}ml)`; sel.appendChild(opt); });
            connect();
        };
    </script>
</body>
</html>
