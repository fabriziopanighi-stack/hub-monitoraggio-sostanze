<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminale Cloud - Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-200 p-6 font-mono">
    <div class="max-w-lg mx-auto bg-gray-800 rounded-lg shadow-xl p-6 border border-gray-700">
        <h1 class="text-2xl font-bold mb-6 text-white border-b border-gray-600 pb-2">Terminale Cloud - Hub</h1>
        
        <div class="mb-6 p-4 bg-gray-700 rounded border border-gray-600">
            <h2 class="text-lg font-semibold mb-3 text-gray-300">Macro-Categoria: Tabacco</h2>
            <button id="btn-sigaretta" class="w-full bg-red-800 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded transition duration-200 border border-red-600 shadow-md">
                Registra 1 Sigaretta
            </button>
        </div>

        <div class="mb-8 p-4 bg-gray-700 rounded border border-gray-600">
            <h2 class="text-lg font-semibold mb-3 text-gray-300">Macro-Categoria: Alcolici</h2>
            <select id="select-alcolico" class="w-full mb-4 bg-gray-900 text-white border border-gray-500 rounded p-3 focus:outline-none focus:border-blue-500">
            </select>
            <button id="btn-alcolico" class="w-full bg-blue-800 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded transition duration-200 border border-blue-600 shadow-md">
                Registra Alcolico
            </button>
        </div>

        <div class="bg-gray-900 p-4 rounded border border-gray-700 relative">
            <h2 class="text-lg font-semibold mb-3 text-gray-400">Log Sistema (Supabase)</h2>
            <div id="loader" class="hidden absolute top-4 right-4 text-sm text-blue-400 animate-pulse">Sincronizzazione...</div>
            <ul id="log-lista" class="space-y-2 text-sm"></ul>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE ESTRATTA DALLE SUE IMMAGINI
        const SUPABASE_URL = 'https://fyibnjnqrmgzeozxxsfx.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_uh8m1jolttETPja2PACa4A_BghkyfoP';

        const DataCore = {
            categorieAlcolici: [
                { id: "birra_piccola", nome: "Birra Piccola", volume_ml: 200, abv: 5.0 },
                { id: "birra_bottiglia_330", nome: "Birra Bott. 330", volume_ml: 330, abv: 5.0 },
                { id: "birra_media", nome: "Birra Media", volume_ml: 400, abv: 5.0 },
                { id: "birra_bottiglia_660", nome: "Birra Bott. 660", volume_ml: 660, abv: 5.0 },
                { id: "vino_calice", nome: "Vino Calice", volume_ml: 150, abv: 12.0 },
                { id: "vino_bottiglia", nome: "Vino Bottiglia", volume_ml: 750, abv: 12.0 },
                { id: "amaro_bicchiere", nome: "Amaro/Digestivo", volume_ml: 60, abv: 30.0 },
                { id: "shot", nome: "Shot", volume_ml: 40, abv: 40.0 },
                { id: "cocktail", nome: "Cocktail", volume_ml: 200, abv: 15.0 }
            ]
        };

        let supabase;

        function inizializzaUI() {
            const selectAlcolico = document.getElementById('select-alcolico');
            DataCore.categorieAlcolici.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat.id;
                option.textContent = `${cat.nome} (${cat.volume_ml}ml - ${cat.abv}%)`;
                selectAlcolico.appendChild(option);
            });
            console.log("UI Popolata correttamente.");
        }

        async function connettiCloud() {
            try {
                if (typeof window.supabase === 'undefined') throw new Error("Libreria non trovata");
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                await caricaDati();
            } catch (err) {
                console.error("Errore connessione Cloud:", err);
            }
        }

        async function caricaDati() {
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');
            const { data, error } = await supabase.from('registrazioni').select('*').order('created_at', { ascending: false }).limit(30);
            if (!error) aggiornaLogVisivo(data);
            loader.classList.add('hidden');
        }

        async function registraDato(nome, quantita) {
            if(!supabase) return alert("Database non connesso");
            document.getElementById('loader').classList.remove('hidden');
            await supabase.from('registrazioni').insert([{ nome, quantita }]);
            await caricaDati();
        }

        function aggiornaLogVisivo(dati) {
            const listaLog = document.getElementById('log-lista');
            listaLog.innerHTML = '';
            dati.forEach(item => {
                const ora = new Date(item.created_at).toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                const li = document.createElement('li');
                li.className = "flex justify-between items-center border-b border-gray-800 pb-2 mb-2 text-xs";
                li.innerHTML = `<div><span class="text-gray-500 mr-2">[${ora}]</span><span class="text-gray-200">${item.nome}</span><br><span class="text-gray-400 font-bold">${item.quantita}</span></div><button onclick="rimuovi('${item.id}')" class="text-red-500 border border-red-800 px-2 py-1 rounded">Elimina</button>`;
                listaLog.appendChild(li);
            });
        }

        window.rimuovi = async (id) => {
            await supabase.from('registrazioni').delete().eq('id', id);
            await caricaDati();
        };

        document.getElementById('btn-sigaretta').onclick = () => registraDato("Sigaretta", "1 unità");
        document.getElementById('btn-alcolico').onclick = () => {
            const cat = DataCore.categorieAlcolici.find(c => c.id === document.getElementById('select-alcolico').value);
            const massa = (cat.volume_ml * (cat.abv / 100) * 0.789).toFixed(2);
            registraDato(cat.nome, `${cat.volume_ml}ml | ${cat.abv}% | ${massa}g`);
        };

        // AVVIO SEQUENZIALE
        document.addEventListener('DOMContentLoaded', () => {
            inizializzaUI();
            connettiCloud();
        });
    </script>
</body>
</html>
